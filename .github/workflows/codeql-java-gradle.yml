# 共通ワークフローの表示名。
# 呼び出し元の実行ログ上でも、この名前で識別される。
name: Reusable CodeQL for Java with Gradle

on:
  # reusable workflow として他リポジトリから呼び出せるようにする。
  workflow_call:
    inputs:
      # 解析ジョブを動かす GitHub-hosted runner の種類。
      runs-on:
        description: Runner image used for the analysis job.
        required: false
        type: string
        default: ubuntu-latest
      # ビルドと解析で使う Java のバージョン。
      java-version:
        description: Java version used for build and analysis.
        required: false
        type: string
        default: '17'
      # actions/setup-java に渡す JDK ディストリビューション。
      java-distribution:
        description: JDK distribution passed to actions/setup-java.
        required: false
        type: string
        default: temurin
      # CodeQL が初期化する解析対象言語。
      # この共通ワークフロー名は Java Gradle 向けとしているため、既定値は java にしている。
      # Kotlin を含むリポジトリでは呼び出し元から java-kotlin を明示する。
      codeql-language:
        description: CodeQL language pack to initialize.
        required: false
        type: string
        default: java
      # CodeQL 初期化後に実行する Gradle コマンド。
      # リポジトリごとに build / bootJar などが異なるため必須入力としている。
      build-command:
        description: Gradle command executed between init and analyze.
        required: true
        type: string

jobs:
  # CodeQL 解析を実行する本体ジョブ。
  analyze:
    name: Analyze
    runs-on: ${{ inputs.runs-on }}

    # CodeQL 実行に必要な最小限の権限。
    permissions:
      contents: read
      security-events: write

    steps:
      # 解析対象リポジトリのソースコードを runner に取得する。
      - name: Checkout repository
        uses: actions/checkout@v5

      # ビルドと CodeQL 解析に必要な Java 実行環境をセットアップする。
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      # Gradle キャッシュや Gradle 実行環境の補助設定を行う。
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # CodeQL データベース作成の初期化処理。
      # build-mode を manual に固定し、後続の build-command で明示ビルドする。
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql-language }}
          build-mode: manual

      # 呼び出し元リポジトリ固有の Gradle ビルド手順を実行する。
      - name: Build application
        run: ${{ inputs.build-command }}

      # CodeQL 解析を実行し、結果を GitHub の code scanning へ送信する。
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

