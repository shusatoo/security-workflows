# Kotlin と Gradle を使う新しいリポジトリ向けの CodeQL サンプルです。
# 実際に使うときは各リポジトリで `.github/workflows/codeql.yml` として保存します。

name: CodeQL

on:
  push:
    # 基本はmain（デフォルトブランチ）だけを対象にすると運用しやすいです。
    branches: ["main"]
  pull_request:
    # main 向け Pull Request で実行し、マージ前に検知できるようにします。
    branches: ["main"]
  schedule:
    # 毎日 20:00 UTC に定期実行します。
    # JST では翌日 05:00 です。
    - cron: '0 20 * * *'

jobs:
  analyze:
    # reusable workflow を呼び出すときも、呼び出し元で最小権限を明示します。
    permissions:
      contents: read
      security-events: write

    # security-workflows 側の reusable workflow を利用します。
    uses: shusatoo/security-workflows/.github/workflows/codeql-java-gradle.yml@v1.0
    with:
      # Java のバージョン
      java-version: '17'

      # Kotlin を含むリポジトリ向けなので、既定値は `java-kotlin` にしています。
      codeql-language: java-kotlin

      # ここだけ各リポジトリのビルド手順に合わせて変更してください。
      # 例:
      # - ライブラリ: ./gradlew clean build --no-daemon
      # - Spring Boot: ./gradlew clean bootJar --no-daemon
      build-command: ./gradlew clean build --no-daemon
